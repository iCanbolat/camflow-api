name: api-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: camflow
          POSTGRES_PASSWORD: camflow
          POSTGRES_DB: camflow
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U camflow -d camflow"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgres://camflow:camflow@localhost:5432/camflow
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-secret-ci-secret-ci-secret-1234567

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:check

      - name: Typecheck / build
        run: pnpm build

      - name: Migrations match schema (no drift)
        run: |
          pnpm db:migrate
          pnpm db:generate
          if [ -n "$(git status --porcelain drizzle)" ]; then
            echo "::error::Schema drift — run pnpm db:generate and commit the migration."
            git status --porcelain drizzle
            exit 1
          fi

      - name: Unit tests
        run: pnpm test

      - name: E2E tests (testcontainers)
        run: pnpm test:e2e
