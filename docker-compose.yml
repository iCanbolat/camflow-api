services:
  postgres:
    image: postgres:16-alpine
    container_name: camflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: camflow
      POSTGRES_PASSWORD: camflow
      POSTGRES_DB: camflow
    ports:
      - '5432:5432'
    volumes:
      - camflow-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U camflow -d camflow']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: camflow-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - camflow-redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  camflow-pgdata:
  camflow-redisdata:
